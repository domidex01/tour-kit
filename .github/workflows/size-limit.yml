name: Size Limit

on:
  pull_request:
    branches: [main]

jobs:
  size:
    name: Size Limit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build --filter='./packages/*'

      - name: Check size
        uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          script: pnpm exec size-limit
          package_manager: pnpm
          # We already installed + built above. Tell the action not to redo
          # those steps (its default `pnpm run build` invokes the whole turbo
          # graph including docs, which is out of scope for the size gate).
          skip_step: build
