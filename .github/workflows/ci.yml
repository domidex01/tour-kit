name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build packages
        run: pnpm build --filter='./packages/*'

      - name: Test
        run: pnpm test --filter='./packages/*'

  # TODO: Re-enable when tooling/bundle-check package exists
  # size:
  #   name: Bundle Size Check
  #   ...

  # TODO: Re-enable when LLM file generation is deterministic across environments
  # llm-freshness:
  #   name: LLM Files Freshness
  #   ...
