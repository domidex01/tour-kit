name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check bundle size limits
        run: pnpm size

      - name: Size comparison (PRs only)
        if: github.event_name == 'pull_request'
        uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          directory: tooling/bundle-check

  llm-freshness:
    name: LLM Files Freshness
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Hash committed LLM files
        run: |
          sha256sum apps/docs/public/llms.txt apps/docs/public/llms-full.txt apps/docs/public/context/*.txt 2>/dev/null | sort > /tmp/before-hashes.txt
          cat /tmp/before-hashes.txt

      - name: Regenerate LLM files
        run: pnpm --filter docs generate:llm

      - name: Hash regenerated LLM files
        run: |
          sha256sum apps/docs/public/llms.txt apps/docs/public/llms-full.txt apps/docs/public/context/*.txt 2>/dev/null | sort > /tmp/after-hashes.txt
          cat /tmp/after-hashes.txt

      - name: Compare hashes
        run: |
          if ! diff /tmp/before-hashes.txt /tmp/after-hashes.txt; then
            echo "::error::LLM files are out of date! Run 'pnpm --filter docs generate:llm' and commit the results."
            exit 1
          fi
          echo "LLM files are up to date."
