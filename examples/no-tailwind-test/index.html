<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TourKit - No Tailwind Test</title>
  <script type="module" src="./main.tsx"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 1.75rem;
      color: #171717;
    }
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .btn-primary {
      background: #6366f1;
      color: white;
    }
    .btn-primary:hover {
      background: #4f46e5;
    }
    .btn-secondary {
      background: #e5e7eb;
      color: #171717;
      margin-right: 0.5rem;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .card {
      padding: 1.5rem;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
    }
    .card h2 {
      font-size: 1.125rem;
      margin-bottom: 0.5rem;
      color: #171717;
    }
    .card p {
      color: #737373;
      font-size: 0.875rem;
    }
    .cta {
      padding: 2rem;
      background: #e5e7eb;
      border-radius: 0.5rem;
      text-align: center;
    }
    .cta h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #171717;
    }
    .cta p {
      color: #737373;
    }
    @media (max-width: 768px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
